    <style>
        /* Typography & Visual Theme */
        body {
            font-family: noto-sans, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, arial, sans-serif;
            background-color: #f8f6f2;

            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;

        /* Cards Component */

        input[type="file"] {

        /* Grade Sections */
        .grade-section {
            margin-bottom: 32px;

        .grade-title {

        }

        /* Kanji Result Items */
        .kanji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .kanji-group {
            padding: 16px;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            background-color: #fcfcfc;

        }
        .kanji-header {
            display: flex;
            align-items: baseline;
            margin-bottom: 12px;
            border-bottom: 1px dashed #e0e0e0;
            padding-bottom: 8px;
        }
        .kanji-char {
            font-size: 28px;
            font-weight: bold;
            margin-right: 12px;
        }

        /* Grade Colors */
        .grade-1 .kanji-char, .grade-1 .grade-title { color: #e53935; border-color: #e53935; }
        .grade-2 .kanji-char, .grade-2 .grade-title { color: #1e88e5; border-color: #1e88e5; }
        .grade-3 .kanji-char, .grade-3 .grade-title { color: #43a047; border-color: #43a047; }
        .grade-4 .kanji-char, .grade-4 .grade-title { color: #fb8c00; border-color: #fb8c00; }
        .grade-5 .kanji-char, .grade-5 .grade-title { color: #8e24aa; border-color: #8e24aa; }
        .grade-6 .kanji-char, .grade-6 .grade-title { color: #00acc1; border-color: #00acc1; }
        .grade-other .kanji-char, .grade-other .grade-title { color: #546e7a; border-color: #546e7a; }

        .context-list {
            margin: 0;
            padding-left: 0;
            list-style-type: none;
        }
        .context-item {
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
            line-height: 1.5;
            background: #fff;
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        .highlight {
            font-weight: bold;
            padding: 0 2px;
            border-radius: 2px;
            color: #000;
            background-color: #fff59d;
        }

        /* Footer */
        footer {
            margin-top: 32px;
            font-size: 12px;
            color: #757575;
            text-align: center;
        }
        
        /* タブ用のスタイル */
        .tabs {

            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e0e0e0;

        .tab-btn {

            border: 1px solid #e0e0e0;
            background-color: #fafafa;
            color: #757575;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px; /* border-bottomに重ねる */
            border-radius: 8px 8px 0 0;
            font-family: inherit;
        }
        .tab-btn:hover {
            color: #0f0f0f;
            background-color: #f0f0f0;
        }
        
        /* 学年ごとのアクティブタブの色設定 */
        .tab-btn.tab-1.active { background-color: #ffebee; color: #d32f2f; border-color: #ffcdd2; border-bottom-color: #e53935; }
        .tab-btn.tab-2.active { background-color: #e3f2fd; color: #1976d2; border-color: #bbdefb; border-bottom-color: #1e88e5; }
        .tab-btn.tab-3.active { background-color: #e8f5e9; color: #388e3c; border-color: #c8e6c9; border-bottom-color: #43a047; }
        .tab-btn.tab-4.active { background-color: #fff3e0; color: #f57c00; border-color: #ffe0b2; border-bottom-color: #fb8c00; }
        .tab-btn.tab-5.active { background-color: #f3e5f5; color: #7b1fa2; border-color: #e1bee7; border-bottom-color: #8e24aa; }
        .tab-btn.tab-6.active { background-color: #e0f7fa; color: #0097a7; border-color: #b2ebf2; border-bottom-color: #00acc1; }
        .tab-btn.tab-other.active { background-color: #eceff1; color: #455a64; border-color: #cfd8dc; border-bottom-color: #546e7a; }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "漢字学習学年チェックツール",
      "description": "word,PDF中の漢字を、小学校での学習学年別に表示するツールです。",
      "applicationCategory": "EducationalApplication",
      "inLanguage": "ja",
      "isAccessibleForFree": true
    }
    </script>
</head>
<body>

    <div class="container">
        <h1>教育漢字さん</h1>
        <span class="subtitle">PDFまたはWord(.docx)からテキストを抽出し、漢字の学習学年を判定します。</span>
        
        <div class="instruction">ファイルを選択してください (PDF / Word)</div>
        <input type="file" id="fileInput" aria-label="PDFまたはWordファイルを選択" accept=".pdf, application/pdf, .docx, application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        <div id="errorMsg" class="error-msg" role="alert" aria-live="polite"></div>
        
        <div id="resultArea">
            <p class="placeholder-text">ファイルを読み込むと、検出された漢字が学年別に分類・表示されます。</p>
        </div>
    </div>

    <footer>
        &copy; 2026 ISHIKAWA, Natsuki | MIT License<br>
        (漢字データ出典：小学校学習指導要領)
    </footer>

    <script>
        // PDF.js workerの設定
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // kanjiData は kanji_data.js で定義

        function getKanjiGrade(char) {
            for (let i = 1; i <= 6; i++) {
                if (kanjiData[i].includes(char)) return i;
            }
            return 'other';
        }

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            const errorMsg = document.getElementById("errorMsg");
            const resultArea = document.getElementById("resultArea");

            errorMsg.textContent = "";

            if (!file) {
                return;
            }

            const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
            const isWord = file.name.toLowerCase().endsWith('.docx') || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';

            if (!isPDF && !isWord) {
                errorMsg.textContent = "※PDFファイルまたはWordファイル(.docx)を選択してください。";
                e.target.value = ''; // 選択状態をリセット
                return;
            }

            try {
                resultArea.innerHTML = '<p class="placeholder-text">テキストを抽出・解析中...</p>';
                const arrayBuffer = await file.arrayBuffer();
                let fullText = "";

                if (isPDF) {
                    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join('');
                    }
                } else if (isWord) {
                    const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
                    fullText = result.value;
                }

                analyzeKanji(fullText);

            } catch (err) {
                console.error(err);
                errorMsg.textContent = "ファイルの解析に失敗しました。";
                resultArea.innerHTML = `<p class="placeholder-text" style="color:#e53935; font-weight:bold;">エラー: ${err.message}<br>（詳細なエラー原因はブラウザのコンソールをご確認ください）</p>`;
            } finally {
                // 次回同じファイルを選んでも反応するようにリセット
                e.target.value = ''; 
            }
        });

        function analyzeKanji(text) {
            text = text.normalize('NFKC'); 
            const kanjiRegex = /\p{Script=Han}/gu;
            
            const gradeResults = {
                1: {}, 2: {}, 3: {}, 4: {}, 5: {}, 6: {}, 'other': {}
            };
            
            const contextPadding = 12;
            let match;
            let totalKanjiFound = 0;

            while ((match = kanjiRegex.exec(text)) !== null) {
                const char = match[0];
                const index = match.index;
                const grade = getKanjiGrade(char);

                const start = Math.max(0, index - contextPadding);
                const end = Math.min(text.length, index + contextPadding + 1);
                const context = text.substring(start, end).replace(/\s+/g, ' ');

                if (!gradeResults[grade][char]) {
                    gradeResults[grade][char] = new Set();
                    totalKanjiFound++;
                }
                if (gradeResults[grade][char].size < 5) {
                    gradeResults[grade][char].add(context);
                }
            }

            if (totalKanjiFound === 0) {
                document.getElementById("resultArea").innerHTML = '<p class="placeholder-text" style="color:#2e7d32; font-weight:600;">漢字が見つかりませんでした。</p>';
                return;
            }

            renderResults(gradeResults);
        }

        function renderResults(gradeResults) {
            const resultArea = document.getElementById("resultArea");
            resultArea.innerHTML = "";

            const tabLabels = {
                1: "小1", 2: "小2", 3: "小3",
                4: "小4", 5: "小5", 6: "小6",
                'other': "その他"
            };
            const fullLabels = {
                1: "小学1年生", 2: "小学2年生", 3: "小学3年生",
                4: "小学4年生", 5: "小学5年生", 6: "小学6年生",
                'other': "小学校で習わない漢字"
            };

            const gradesWithData = ['1', '2', '3', '4', '5', '6', 'other'].filter(grade => 
                Object.keys(gradeResults[grade]).length > 0
            );

            const tabsContainer = document.createElement("div");
            tabsContainer.className = "tabs";
            
            const contentContainer = document.createElement("div");

            let isFirst = true;

            gradesWithData.forEach(grade => {
                const kanjisInGrade = Object.keys(gradeResults[grade]).sort();
                
                const tabBtn = document.createElement("button");
                // 学年ごとの固有クラス(tab-X)を付与するよう修正
                tabBtn.className = `tab-btn tab-${grade}` + (isFirst ? " active" : "");
                tabBtn.innerHTML = `${tabLabels[grade]} <span style="font-size:12px; font-weight:normal;">(${kanjisInGrade.length})</span>`;
                
                const section = document.createElement("div");
                section.className = `tab-content grade-section grade-${grade}` + (isFirst ? " active" : "");

                const title = document.createElement("div");
                title.className = "grade-title";
                title.innerHTML = `<span>${fullLabels[grade]}</span> <span class="count">${kanjisInGrade.length}種類の漢字</span>`;
                section.appendChild(title);

                const grid = document.createElement("div");
                grid.className = "kanji-grid";

                kanjisInGrade.forEach(kanji => {
                    const group = document.createElement("div");
                    group.className = "kanji-group";

                    const header = document.createElement("div");
                    header.className = "kanji-header";
                    header.innerHTML = `<span class="kanji-char">${kanji}</span>`;
                    group.appendChild(header);

                    const list = document.createElement("ul");
                    list.className = "context-list";
                    
                    gradeResults[grade][kanji].forEach(ctx => {
                        const li = document.createElement("li");
                        li.className = "context-item";
                        const highlighted = ctx.replace(new RegExp(kanji, 'g'), `<span class="highlight">${kanji}</span>`);
                        li.innerHTML = `...${highlighted}...`;
                        list.appendChild(li);
                    });

                    group.appendChild(list);
                    grid.appendChild(group);
                });

                section.appendChild(grid);
                
                tabBtn.addEventListener("click", () => {
                    tabsContainer.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                    contentContainer.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                    
                    tabBtn.classList.add('active');
                    section.classList.add('active');
                });

                tabsContainer.appendChild(tabBtn);
                contentContainer.appendChild(section);
                
                isFirst = false;
            });

            resultArea.appendChild(tabsContainer);
            resultArea.appendChild(contentContainer);
        }
    </script>
</body>
</html>
